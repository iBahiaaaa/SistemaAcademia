<!DOCTYPE html>
<html lang="pt-br">
<head>

    <link rel="shortcut icon" href="arquivos\imagens\favicon.png" type="image/x-icon">

            <h1 class="botoeslateral"><img src="arquivos/imagens/group.svg" alt="Clientes">Clientes</h1>
            <h1 class="botoeslateral"><img src="arquivos/imagens/card.svg" alt="Planos">Planos</h1>

            <h1 class="botoeslateral"><img src="arquivos/imagens/prancheta.svg" alt="Avaliação">Avaliação</h1>

        <section id="conteudo">
            <section class="cardunico">

            </section>

                </section>

                </section>
            </section>

                <section id="card1">
                    <h1>Clientes</h1>
                    <div class="badges">
                        <button class="green" id="greenhover">Pagos</button>
                        <button class="yellow" id="yellowhover">Pendentes</button>
                        <button class="red" id="redhover">Inadimplentes</button>
                    </div>
                    <section id="card11">

                        </div>

                </section>
                <section id="card2">
                    <h1>teste2</h1>

                <section id="card3">
